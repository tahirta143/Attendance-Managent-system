{% extends 'base.html' %}

{% block title %}Create Employee - Attendance System{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-user-plus"></i> Add New Employee</h1>
</div>

<div class="form-container">
    <div class="alert alert-info" style="margin-bottom: 20px;">
        <i class="fas fa-info-circle"></i> Employee ID will be auto-generated: <strong>{{ next_employee_id }}</strong>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name *</label>
                <input type="text" id="first_name" name="first_name" value="{{ form_data.first_name }}" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name *</label>
                <input type="text" id="last_name" name="last_name" value="{{ form_data.last_name }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" value="{{ form_data.email }}" required>
                <small style="color: #6b7280;">Must be unique</small>
            </div>
            <div class="form-group">
                <label for="phone">Phone *</label>
                <input type="text" id="phone" name="phone" value="{{ form_data.phone }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="gender">Gender *</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="M" {% if form_data.gender == 'M' %}selected{% endif %}>Male</option>
                    <option value="F" {% if form_data.gender == 'F' %}selected{% endif %}>Female</option>
                    <option value="O" {% if form_data.gender == 'O' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date_of_birth">Date of Birth *</label>
                <input type="date" id="date_of_birth" name="date_of_birth" value="{{ form_data.date_of_birth }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="date_of_joining">Date of Joining *</label>
                <input type="date" id="date_of_joining" name="date_of_joining" value="{{ form_data.date_of_joining }}" required>
            </div>
            <div class="form-group">
                <label for="department">Department *</label>
                <input type="text" id="department" name="department" value="{{ form_data.department }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="designation">Designation *</label>
            <input type="text" id="designation" name="designation" value="{{ form_data.designation }}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Create Employee
            </button>
            <a href="{% url 'employees_list' %}" class="btn btn-danger">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
