{% extends 'base.html' %}

{% block title %}Edit Employee - Attendance System{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-user-edit"></i> Edit Employee</h1>
</div>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="employee_id">Employee ID</label>
            <input type="text" id="employee_id" value="{{ employee.employee_id }}" readonly style="background-color: #f3f4f6; cursor: not-allowed;">
            <small style="color: #6b7280;">Employee ID cannot be changed</small>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name *</label>
                <input type="text" id="first_name" name="first_name" value="{{ employee.first_name }}" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name *</label>
                <input type="text" id="last_name" name="last_name" value="{{ employee.last_name }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" value="{{ employee.email }}" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone *</label>
                <input type="text" id="phone" name="phone" value="{{ employee.phone }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="gender">Gender *</label>
                <select id="gender" name="gender" required>
                    <option value="M" {% if employee.gender == 'M' %}selected{% endif %}>Male</option>
                    <option value="F" {% if employee.gender == 'F' %}selected{% endif %}>Female</option>
                    <option value="O" {% if employee.gender == 'O' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date_of_birth">Date of Birth *</label>
                <input type="date" id="date_of_birth" name="date_of_birth" value="{{ employee.date_of_birth|date:'Y-m-d' }}" required>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="date_of_joining">Date of Joining *</label>
                <input type="date" id="date_of_joining" name="date_of_joining" value="{{ employee.date_of_joining|date:'Y-m-d' }}" required>
            </div>
            <div class="form-group">
                <label for="department">Department *</label>
                <input type="text" id="department" name="department" value="{{ employee.department }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="designation">Designation *</label>
            <input type="text" id="designation" name="designation" value="{{ employee.designation }}" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Update Employee
            </button>
            <a href="{% url 'employees_list' %}" class="btn btn-danger">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
