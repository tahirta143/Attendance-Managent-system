<!DOCTYPE html>
<html>
<head>
    <title>Chart Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        canvas { max-height: 400px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chart.js Test</h1>
        <div id="status"></div>
        <canvas id="testChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        const statusDiv = document.getElementById('status');
        
        function showStatus(message, isError = false) {
            statusDiv.className = 'status ' + (isError ? 'error' : 'success');
            statusDiv.textContent = message;
            console.log(message);
        }

        // Check if Chart.js loaded
        if (typeof Chart === 'undefined') {
            showStatus('❌ ERROR: Chart.js failed to load from CDN', true);
        } else {
            showStatus('✅ Chart.js loaded successfully!');
            
            // Create test chart
            try {
                const ctx = document.getElementById('testChart');
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Present (6)', 'Absent (1)', 'Leave (0)', 'Late (0)'],
                        datasets: [{
                            data: [6, 1, 0, 0],
                            backgroundColor: ['#10b981', '#ef4444', '#f59e0b', '#3b82f6']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' },
                            title: { display: true, text: 'Test Chart - Today\'s Attendance' }
                        }
                    }
                });
                showStatus('✅ Chart.js loaded and chart created successfully!');
            } catch (error) {
                showStatus('❌ ERROR creating chart: ' + error.message, true);
            }
        }
    </script>
</body>
</html>
